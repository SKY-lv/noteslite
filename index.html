<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotesLite - 轻量笔记</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.app{display:grid;grid-template-columns:280px 1fr;height:100vh;}
.sidebar{background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;}
.sidebar-header{padding:14px;border-bottom:1px solid #334155;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.note-list{flex:1;overflow-y:auto;padding:8px;}
.note-item{padding:12px;border-radius:8px;cursor:pointer;margin:4px 0;transition:all 0.15s;}
.note-item:hover{background:#334155;}
.note-item.active{background:#3b82f633;border:1px solid #3b82f6;}
.note-item h4{font-size:13px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.note-item p{font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.note-item .time{font-size:10px;color:#475569;margin-top:4px;}
.main{display:flex;flex-direction:column;background:#0f172a;}
.toolbar{height:44px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 16px;gap:12px;}
.toolbar input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px 12px;font-size:14px;}
.toolbar input:focus{outline:none;border-color:#3b82f6;}
.editor{flex:1;display:flex;flex-direction:column;}
.editor textarea{flex:1;background:none;border:none;color:#e2e8f0;padding:20px;font-size:15px;resize:none;line-height:1.7;}
.editor textarea:focus{outline:none;}
.status{padding:8px 16px;background:#1e293b;border-top:1px solid #334155;font-size:12px;color:#64748b;}
.btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;}
.btn-primary{background:#3b82f6;color:#fff;}
.btn-secondary{background:#334155;color:#e2e8f0;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>📝 笔记</span>
      <button class="btn btn-primary" onclick="createNote()">+ 新建</button>
    </div>
    <div class="note-list" id="note-list"></div>
  </div>
  
  <div class="main">
    <div class="toolbar">
      <input type="text" id="title" placeholder="标题" oninput="updateNote()">
      <button class="btn btn-secondary" onclick="deleteNote()">删除</button>
    </div>
    <div class="editor">
      <textarea id="content" placeholder="开始输入..." oninput="updateNote()"></textarea>
    </div>
    <div class="status">
      <span>自动保存</span>
      <span>|</span>
      <span id="word-count">0 字</span>
    </div>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem('noteslite_data') || '[]');
let currentId = null;

function renderList() {
  document.getElementById('note-list').innerHTML = notes.map(n => `
    <div class="note-item ${currentId === n.id ? 'active' : ''}" onclick="selectNote('${n.id}')">
      <h4>${n.title || '无标题'}</h4>
      <p>${n.content.slice(0, 50) || '空笔记'}</p>
      <div class="time">${new Date(n.updated).toLocaleString()}</div>
    </div>
  `).join('') || '<div style="padding:20px;text-align:center;color:#64748b">暂无笔记</div>';
}

function selectNote(id) {
  currentId = id;
  const note = notes.find(n => n.id === id);
  if (note) {
    document.getElementById('title').value = note.title;
    document.getElementById('content').value = note.content;
    updateWordCount();
  }
  renderList();
}

function createNote() {
  const note = {
    id: 'n_' + Date.now(),
    title: '',
    content: '',
    created: Date.now(),
    updated: Date.now()
  };
  notes.unshift(note);
  save();
  selectNote(note.id);
}

function updateNote() {
  if (!currentId) return;
  
  const note = notes.find(n => n.id === currentId);
  if (note) {
    note.title = document.getElementById('title').value;
    note.content = document.getElementById('content').value;
    note.updated = Date.now();
    save();
    updateWordCount();
    renderList();
  }
}

function deleteNote() {
  if (!currentId) return;
  if (!confirm('删除此笔记？')) return;
  
  notes = notes.filter(n => n.id !== currentId);
  currentId = null;
  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
  save();
  renderList();
}

function updateWordCount() {
  const content = document.getElementById('content').value;
  document.getElementById('word-count').textContent = content.length + ' 字';
}

function save() {
  localStorage.setItem('noteslite_data', JSON.stringify(notes));
}

// Init
if (notes.length > 0) {
  selectNote(notes[0].id);
} else {
  renderList();
}
</script>
</body>
</html>
